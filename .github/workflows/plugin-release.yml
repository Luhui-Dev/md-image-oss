name: Plugin release

on:
  push:
    tags:
      - "plugin-v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: obsidian-plugin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: obsidian-plugin/package-lock.json

      - run: npm ci || npm install

      - run: npm test

      - run: npm run build

      - name: Verify manifest version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#plugin-v}"
          MANIFEST=$(node -p "require('./manifest.json').version")
          if [ "$TAG" != "$MANIFEST" ]; then
            echo "Tag '$TAG' does not match manifest version '$MANIFEST'"
            exit 1
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Plugin ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            obsidian-plugin/main.js
            obsidian-plugin/manifest.json
            obsidian-plugin/styles.css
